services:
  # =============================================
  # Backend - Node.js Express API
  # =============================================
  - type: web
    name: college-admin-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_TYPE
        value: postgres
      - key: DATABASE_URL
        sync: false   # Set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        value: dtdb4irno
      - key: CLOUDINARY_UPLOAD_PRESET
        value: myvault_unsigned

  # =============================================
  # Frontend - Static React (Vite)
  # =============================================
  - type: web
    name: college-admin-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://college-admin-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
